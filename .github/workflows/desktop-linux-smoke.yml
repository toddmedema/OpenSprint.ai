name: Desktop Linux smoke

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "packages/**"
      - "scripts/**"
      - ".github/workflows/desktop-linux-smoke.yml"
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "packages/**"
      - "scripts/**"
      - ".github/workflows/desktop-linux-smoke.yml"

jobs:
  build-linux-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: node packages/electron/scripts/prepare-desktop-resources.js
      - run: npm run build:linux -w packages/electron
      - name: Verify Linux artifact
        run: ls -la packages/electron/dist/*.AppImage
